name: Parking API Tests

on:
  workflow_dispatch:
    inputs:
      test_env:
        description: "Environment profile to run"
        required: true
        default: "aws-ec2"
        type: choice
        options:
          - local
          - aws
          - aws-ec2
          - aws-tunnel
      cucumber_tags:
        description: "Cucumber tag expression"
        required: true
        default: "@auth and @smoke"
        type: string
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  api-tests:
    name: API Tests
    runs-on: self-hosted
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    env:
      TEST_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'aws-ec2' }}
      CUCUMBER_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.cucumber_tags || '@auth and @smoke' }}
      AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_TUNNEL_ENABLED: ${{ secrets.DB_TUNNEL_ENABLED }}
      DB_TUNNEL_EC2_HOST: ${{ secrets.DB_TUNNEL_EC2_HOST }}
      DB_TUNNEL_EC2_USER: ${{ secrets.DB_TUNNEL_EC2_USER }}
      DB_TUNNEL_RDS_HOST: ${{ secrets.DB_TUNNEL_RDS_HOST }}
      DB_TUNNEL_RDS_PORT: ${{ secrets.DB_TUNNEL_RDS_PORT }}
      DB_TUNNEL_LOCAL_HOST: "127.0.0.1"
      DB_TUNNEL_LOCAL_PORT: "15432"
      DB_TUNNEL_KEY_PATH: /tmp/parking-ec2-key.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Prepare SSH key for DB tunnel
        if: env.TEST_ENV == 'aws-tunnel'
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "SSH_PRIVATE_KEY secret is required for aws-tunnel runs." >&2
            exit 1
          fi
          printf '%s' "$SSH_PRIVATE_KEY" > "$DB_TUNNEL_KEY_PATH"
          chmod 600 "$DB_TUNNEL_KEY_PATH"

      - name: Show selected test configuration
        shell: bash
        run: |
          echo "Environment: $TEST_ENV"
          echo "Tags       : $CUCUMBER_TAGS"
          echo "Auth URL   : ${AUTH_BASE_URL:-profile default}"
          if [ "$TEST_ENV" = "aws-tunnel" ]; then
            echo "Tunnel     : ${DB_TUNNEL_EC2_USER:-profile default}@${DB_TUNNEL_EC2_HOST:-profile default} -> ${DB_TUNNEL_RDS_HOST:-profile default}:${DB_TUNNEL_RDS_PORT:-5432}"
          fi

      - name: Run Maven tests
        id: maven-tests
        shell: bash
        continue-on-error: true
        run: |
          mvn clean test -Dtest.env="$TEST_ENV" -D"cucumber.filter.tags=$CUCUMBER_TAGS"

      - name: Add Allure executor metadata
        if: always()
        shell: bash
        run: |
          mkdir -p target/allure-results
          cat > target/allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Parking API Tests - ${TEST_ENV}"
          }
          EOF

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          mvn allure:report

      - name: Normalize Allure report metadata
        if: always()
        shell: bash
        run: |
          if [ -f target/allure-report/widgets/summary.json ]; then
            sed -i 's/"reportName":"Allure Report"/"reportName":"Parking API Tests"/' target/allure-report/widgets/summary.json
          fi
          if [ -f target/allure-report/widgets/executors.json ]; then
            cat > target/allure-report/widgets/executors.json <<EOF
          [{
            "name": "GitHub Actions",
            "type": "github",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Parking API Tests - ${TEST_ENV}"
          }]
          EOF
          fi

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Prepare GitHub Pages report
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p pages
          cp -R target/allure-report/* pages/

      - name: Configure GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy Allure report to GitHub Pages
        id: deploy-pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Parking API Test Run"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`$TEST_ENV\` |"
            echo "| Tags | \`$CUCUMBER_TAGS\` |"
            echo "| Maven result | \`${{ steps.maven-tests.outcome }}\` |"
            echo ""
            echo "Reports are available from this workflow run's artifacts:"
            echo ""
            echo "- cucumber-report"
            echo "- allure-report"
            echo "- surefire-reports"
            if [ -n "${{ steps.deploy-pages.outputs.page_url }}" ]; then
              echo ""
              echo "Published Allure report: ${{ steps.deploy-pages.outputs.page_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when tests fail
        if: steps.maven-tests.outcome != 'success'
        shell: bash
        run: exit 1
